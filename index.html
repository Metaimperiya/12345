<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaImperiya Site</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff9d;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 2px solid #00d4ff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            background: rgba(0, 0, 0, 0.8);
        }
        h1 { margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        p { color: #fff; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #00d4ff;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MetaImperiya</h1>
        <p>Система успешно развернута.</p>
        <a href="#" class="btn">Вход в систему</a>
    </div>
</body>
</html>
